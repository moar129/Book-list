name: CI/CD Pipeline
on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
jobs:
    ci:
        name: CI — Lint, Test & Build
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v6
            - name: Setup Node.js v24
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "npm"
            - name: Installer dependencies
              run: npm ci
            - name: Lint
              run: npm run lint
            - name: Test
              run: npm run test
              env:
                  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
                  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
            - name: Build
              run: npm run build
              env:
                  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
                  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    deploy-staging:
        name: Deploy til Staging
        needs: ci
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        steps:
          - name: Get code
            uses: actions/checkout@v6
          - name: Setup Node.js v24
            uses: actions/setup-node@v6
            with:
              node-version: "24"
              cache: "npm"
          - name: Installer dependencies
            run: npm ci
          - name: Deploy til Staging (Vercel Preview)
            run: |
              npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
              npx vercel build --token=${{ secrets.VERCEL_TOKEN }}
              npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
            env:
              VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
              VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
              VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
              VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
